<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Finigan — Online Cart</title>
    <meta name="description" content="Order the Café Finigan’s menu online in-advance. Browse the menu entire menu and pick-up your order at your chosen time.">
    <meta name="keywords" content="café, pre-order, Finigan, lunch, breakfast">
    <meta name="auther" content="Lance Speakman">
    <link rel="icon" href="../static/images/logo.png" type="image/png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">

            <!-- ---------- Brand Section (Logo + Name) ---------- -->
            <div class="brand">
                <a href="main.html">
                    <img src="../static/images/logo.png" alt="Café Finigan logo" class="logo">
                </a>
                <span class="brand-name">Café Finigan</span>
            </div>

            <!-- ---------- Navigation Menu ---------- -->
            <nav aria-label="Primary">
                <ul class="nav-list">
                    <li><a href="main.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="orders.html">Order</a></li>
                    <li><a href="contact.html">Contact</a></li> 
                </ul>
            </nav>
        </div>
    </header>
    
    <!-- ---------- Menu Banner ---------- -->
    <section class="menu-banner">
        <img src="../static/images/menu-banner.jpg" alt="Café Finigan Menu artwork">
        <div class="banner-text container">
            <h1>Your Order</h1>
            <p class="lead">Review your items before placing your order.</p>
        </div>
    </section>

    <!-- ---------- Checkout Section ---------- -->
    <section class="menu-section">
        <div class="container">
            <div class="menu-card">

                <!-- Heading + form fields -->
                <h3 class="order-details-heading">Enter your details:</h3>

                <form id="order-form" class="order-form">

                    <label>
                        Name:
                        <input id="customer-name" required>
                    </label>

                    <label>
                        Email:
                        <input id="customer-email" required>
                    </label>

                    <label>
                        Pick-up time:
                        <input type="time" id="pickup-time" required>
                    </label>

                </form>
                <div id="formMessage" style="color: red; margin-top: 10px;"></div>
                <!-- Order summary table -->
                <table class="order-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="order-rows">
                    <!-- JavaScript will insert rows here -->
                    </tbody>
                </table>

                <p class="order-total">
                    <strong>Total:</strong>
                    $<span id="order-total">0.00</span>
                </p>

                <!-- Button centred under Total -->
                <div class="order-button-row">
                    <button type="submit" form="order-form" class="add-btn order-button">
                        Place order
                    </button>
                </div>

                <p id="order-message" class="note"></p>

            </div>
        </div>
    </section>

    <!-- ---------- Footer Section ---------- -->
    <footer class="site-footer">
        <div class="container">
            © 2025 Café Finigan • <a href="privacy.html">Privacy</a>
        </div>
    </footer>


    <!-- Checkout script -->
    <script src="../static/orders.js"></script>

    <script>
    // Register the service worker so the PWA can work offline
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("../service-worker.js")
        .then(registration => {
            console.log("Service worker registered with scope:", registration.scope);
        })
        .catch(error => {
            console.error("Service worker registration failed:", error);
        });
    }
    </script>

</body>
</html>
