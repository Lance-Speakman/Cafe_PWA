<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Finigan — Online Cart</title>
    <meta name="description" content="Order the Café Finigan’s menu online in-advance. Browse the menu entire menu and pick-up your order at your chosen time.">
    <meta name="keywords" content="café, pre-order, Finigan, lunch, breakfast">
    <meta name="auther" content="Lance Speakman">
    <link rel="icon" href="../static/images/logo.png" type="image/png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- ---------- Menu Banner ---------- -->
    <section class="menu-banner">
        <img src="../static/images/menu-banner.jpg" alt="Café Finigan Menu artwork">
        <div class="banner-text container">
            <h1>Your Order</h1>
            <p class="lead">Freshly made and ready when you are.</p>
        </div>
    </section>

    <!-- ---------- Thank You Section ---------- -->
    <section class="menu-section">
        <div class="container">
            <div class="menu-card">
            <h2>Thanks for your order!</h2>
            <p id="thanks-message" class="note"></p>

            <a href="menu.html" class="add-btn">Back to menu</a>
            </div>
        </div>
    </section>

    <!-- ---------- Footer Section ---------- -->
    <footer class="site-footer">
        <div class="container">
            © 2025 Café Finigan • <a href="privacy.html">Privacy</a>
        </div>
    </footer>



    <script src="../static/thanks.js"></script>

    <script>
    // Register the service worker so the PWA can work offline
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("../service-worker.js")
        .then(registration => {
            console.log("Service worker registered with scope:", registration.scope);
        })
        .catch(error => {
            console.error("Service worker registration failed:", error);
        });
    }
    </script>
    
</body>
</html>
