<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Finigan — Online Ordering</title>
    <meta name="description" content="Order the Café Finigan’s menu online in-advance. Browse the menu entire menu and pick-up your order at your chosen time.">
    <meta name="keywords" content="café, pre-order, Finigan, lunch, breakfast">
    <meta name="auther" content="Lance Speakman">
    <link rel="icon" href="../static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <!-- ---------- Menu Banner ---------- -->
    <section class="menu-banner">
        <img src="../static/images/menu-banner.jpg" alt="Café Finigan Menu artwork">
        <div class="banner-text container">
            <h1>Our Menu</h1>
            <p class="lead">Freshly made and ready when you are.</p>
        </div>
    </section>

    <!-- ---------- Menu Sections (Breakfast, Lunch, Drinks) ---------- -->
    <section class="menu-section" id="breakfast">
        <div class="container">

            <!-- Breakfast Section -->
            <div class="menu-card">
                <h2>Breakfast</h2>
                <div id="menu-breakfast" class="menu-items"></div>
            </div>

            <!-- Lunch Section -->
            <div class="menu-card">
                <h2>Lunch</h2>
                <div id="menu-lunch" class="menu-items"></div>
            </div>

            <!-- Drinks Section -->
            <div class="menu-card">
                <h2>Drinks</h2>
                <div id="menu-drinks" class="menu-items"></div>
            </div>

        </div> <!-- end of .container -->
    </section>

    <!-- ---------- Footer Section ---------- -->
    <footer class="site-footer">
        <div class="container">
            © 2025 Café Finigan • <a href="#">Privacy</a>
        </div>
    </footer>
    <script src="../static/menu.js"></script>
</body>
</html>
