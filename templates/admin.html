<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Finigan — Online Menu</title>
    <meta name="description" content="Order the Café Finigan’s menu online in-advance. Browse the menu entire menu and pick-up your order at your chosen time.">
    <meta name="keywords" content="café, pre-order, Finigan, lunch, breakfast">
    <meta name="auther" content="Lance Speakman">
    <link rel="icon" href="../static/images/logo.png" type="image/png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">

            <!-- ---------- Brand Section (Logo + Name) ---------- -->
            <div class="brand">
                <a href="main.html">
                    <img src="../static/images/logo.png" alt="Café Finigan logo" class="logo">
                </a>
                <span class="brand-name">Café Finigan</span>
            </div>

            <!-- ---------- Navigation Menu ---------- -->
            <nav aria-label="Primary">
                <ul class="nav-list">
                    <li><a href="main.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="orders.html">Order</a></li>
                    <li><a href="contact.html">Contact</a></li> 
                </ul>
            </nav>
        </div>
    </header>
    <section>
        <div id="admin-links"></div>
        <p id="message"></p>

        <script>
            fetch("http://127.0.0.1:5050/admin-links", {
                credentials: "include"
            })
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById("admin-links");
                const message = document.getElementById("message");

                if (data.links.length > 0) {
                    data.links.forEach(link => {
                        const a = document.createElement("a");
                        a.href = link.url;
                        a.textContent = link.name;
                        container.appendChild(a);
                    });
                } else {
                    message.textContent = "You do not have admin access.";
                }
            })
            .catch(err => {
                console.error("Error loading admin links:", err);
                document.getElementById("message").textContent =
                    "Could not load admin dashboard.";
            });
        </script>
    </section>
    
</body>
</html>
